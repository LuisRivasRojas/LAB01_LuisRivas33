apiVersion: v1
kind: Service
metadata:
  name: ms-productos-service
spec:
  selector:
    app: ms-productos
  ports:
    - protocol: TCP
      port: 8081        # puerto del Service dentro del cluster
      targetPort: 8081  # puerto del contenedor
  type: LoadBalancer    # expone externamente (en Minikube usa NodePort o minikube tunnel)
